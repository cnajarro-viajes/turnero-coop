<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Balanza - Unión Coop.</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f2f4f3; color: #1a1a1a; min-height: 100vh;
    }

    /* LOGIN */
    .login-wrap { min-height:100vh; display:flex; align-items:center; justify-content:center; padding:24px; }
    .login-card {
      background:white; border-radius:20px; padding:36px 32px;
      width:100%; max-width:360px; box-shadow:0 4px 24px rgba(0,0,0,0.08); text-align:center;
    }
    .login-icon { font-size:48px; margin-bottom:16px; }
    .login-title { font-size:22px; font-weight:800; margin-bottom:6px; }
    .login-sub { font-size:14px; color:#888; margin-bottom:28px; }
    .pin-display { display:flex; justify-content:center; gap:10px; margin-bottom:24px; }
    .pin-dot { width:14px; height:14px; border-radius:50%; border:2px solid #ccc; transition:all 0.15s; }
    .pin-dot.filled { background:#2d6a4f; border-color:#2d6a4f; }
    .numpad { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; }
    .numpad-btn {
      padding:16px; font-size:20px; font-weight:600;
      background:#f5f5f5; border:none; border-radius:12px; cursor:pointer; transition:background 0.1s;
    }
    .numpad-btn:active { background:#e0e0e0; }
    .numpad-btn.del { font-size:16px; color:#888; }
    .numpad-btn.empty { visibility:hidden; }
    .login-error { color:#d62828; font-size:13px; margin-top:14px; display:none; }

    /* APP */
    #app { display:none; }

    .topbar {
      background:#2d6a4f; color:white; padding:14px 24px;
      display:flex; align-items:center; justify-content:space-between;
    }
    .topbar-left { display:flex; align-items:center; gap:12px; }
    .topbar-info div:first-child { font-size:16px; font-weight:700; }
    .topbar-info div:last-child { font-size:12px; opacity:0.7; }

    .live-badge {
      display:flex; align-items:center; gap:5px;
      background:rgba(255,255,255,0.15); border-radius:20px; padding:5px 12px;
      font-size:12px; font-weight:700;
    }
    .live-dot { width:7px; height:7px; border-radius:50%; background:#4ade80; animation:pulse 1.5s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

    .stats-bar { background:#1b4332; color:white; padding:10px 24px; display:flex; gap:28px; }
    .stat { text-align:center; }
    .stat-num { font-size:22px; font-weight:800; }
    .stat-label { font-size:11px; opacity:0.7; text-transform:uppercase; letter-spacing:0.05em; }

    .toolbar {
      background:white; border-bottom:1px solid #eee;
      padding:14px 24px; display:flex; align-items:center; gap:12px; flex-wrap:wrap;
    }
    .btn-toolbar {
      padding:9px 18px; border:none; border-radius:10px;
      font-size:14px; font-weight:600; cursor:pointer; transition:opacity 0.1s;
    }
    .btn-toolbar:active { opacity:0.75; }
    .btn-siguiente { background:#2d6a4f; color:white; }
    .btn-reset { background:#fff0f0; color:#c62828; border:1.5px solid #ffcdd2; }

    .queue-container { padding:20px 24px; max-width:900px; margin:0 auto; }
    .queue-empty { text-align:center; padding:60px 20px; color:#aaa; }
    .queue-empty-icon { font-size:48px; margin-bottom:12px; }

    .turno-card {
      background:white; border-radius:14px; padding:16px 20px; margin-bottom:10px;
      display:flex; align-items:center; gap:16px;
      box-shadow:0 1px 6px rgba(0,0,0,0.05); border-left:4px solid transparent;
      transition:box-shadow 0.15s;
    }
    .turno-card:hover { box-shadow:0 3px 14px rgba(0,0,0,0.1); }
    .turno-card.primero { border-left-color:#2d6a4f; background:#f6fbf8; }

    .turno-num { font-size:28px; font-weight:900; color:#1a1a1a; min-width:52px; text-align:center; }
    .turno-card.primero .turno-num { color:#2d6a4f; }
    .turno-info { flex:1; min-width:0; }
    .turno-patente { font-size:18px; font-weight:700; letter-spacing:0.03em; margin-bottom:4px; }

    .turno-tags { display:flex; flex-wrap:wrap; gap:6px; }
    .tag { font-size:11px; font-weight:600; padding:3px 9px; border-radius:20px; white-space:nowrap; }
    .tag-producto { background:#e8f5e9; color:#2e7d32; }
    .tag-origen   { background:#e3f2fd; color:#1565c0; }
    .tag-cpe      { background:#f3e5f5; color:#6a1b9a; }
    .tag-tiempo   { background:#f5f5f5; color:#757575; }
    .primero-badge {
      font-size:10px; font-weight:700; color:white;
      background:#2d6a4f; border-radius:20px; padding:2px 8px; white-space:nowrap;
    }

    .btn-atender {
      padding:9px 16px; border:none; border-radius:10px;
      font-size:13px; font-weight:600; cursor:pointer;
      background:#2d6a4f; color:white; transition:opacity 0.1s; white-space:nowrap;
    }
    .btn-atender:active { opacity:0.75; }

    .modal-overlay {
      position:fixed; inset:0; background:rgba(0,0,0,0.5);
      display:none; align-items:center; justify-content:center; z-index:200;
    }
    .modal-overlay.active { display:flex; }
    .modal {
      background:white; border-radius:18px; padding:32px 28px;
      max-width:360px; width:90%; text-align:center;
    }
    .modal-icon { font-size:44px; margin-bottom:14px; }
    .modal-title { font-size:20px; font-weight:700; margin-bottom:8px; }
    .modal-sub { font-size:14px; color:#666; margin-bottom:24px; line-height:1.5; }
    .modal-btns { display:flex; gap:10px; }
    .modal-btn { flex:1; padding:13px; border:none; border-radius:12px; font-size:15px; font-weight:600; cursor:pointer; }
    .modal-cancel  { background:#f0f0f0; color:#1a1a1a; }
    .modal-confirm { background:#d62828; color:white; }

    .last-update { font-size:12px; color:#aaa; margin-left:auto; }
  </style>
</head>

      </div>
    </div>
    <div class="live-badge"><span class="live-dot"></span> EN VIVO</div>
  </div>

  <div class="stats-bar">
    <div class="stat">
      <div class="stat-num" id="statEsperando">0</div>
      <div class="stat-label">Esperando</div>
    </div>
    <div class="stat">
      <div class="stat-num" id="statAtendidos">0</div>
      <div class="stat-label">Atendidos hoy</div>
    </div>
  </div>

  <div class="toolbar">
    <button class="btn-toolbar btn-siguiente" onclick="siguienteTurno()">▶ Llamar siguiente</button>
    <button class="btn-toolbar btn-reset" onclick="confirmarReset()">🗑 Resetear cola</button>
    <span class="last-update" id="lastUpdate"></span>
  </div>

  <div class="queue-container">
    <div id="queueList"></div>
  </div>
</div>

<!-- Modal Reset -->
<div class="modal-overlay" id="modalReset">
  <div class="modal">
    <div class="modal-icon">⚠️</div>
    <h2 class="modal-title">¿Resetear la cola?</h2>
    <p class="modal-sub">Esto eliminará todos los turnos. Los camioneros tendrán que volver a anotarse. No se puede deshacer.</p>
    <div class="modal-btns">
      <button class="modal-btn modal-cancel" onclick="cerrarModal()">Cancelar</button>
      <button class="modal-btn modal-confirm" onclick="resetearCola()">Sí, resetear</button>
    </div>
  </div>
</div>

<script>
  // ========== INIT SUPABASE ==========
  const { createClient } = supabase;
  const db = createClient(SUPABASE_URL, SUPABASE_KEY);

  let pinActual = '';

  // ========== LOGIN ==========
  function addPin(d) {
    if (pinActual.length >= 4) return;
    pinActual += d;
    actualizarDots();
    if (pinActual.length === 4) setTimeout(verificarPin, 150);
  }
  function delPin() {
    pinActual = pinActual.slice(0, -1);
    actualizarDots();
    document.getElementById('loginError').style.display = 'none';
  }
  function actualizarDots() {
    for (let i = 0; i < 4; i++)
      document.getElementById(`dot${i}`).className = 'pin-dot' + (i < pinActual.length ? ' filled' : '');
  }
  function verificarPin() {
    if (pinActual === PIN_CORRECTO) {
      document.getElementById('loginWrap').style.display = 'none';
      document.getElementById('app').style.display = 'block';
      iniciarApp();
    } else {
      document.getElementById('loginError').style.display = 'block';
      pinActual = ''; actualizarDots();
    }
  }

  // ========== COLA ==========
  function tiempoEspera(ts) {
    const mins = Math.floor((Date.now() - ts) / 60000);
    if (mins < 1)  return 'Recién llegó';
    if (mins < 60) return `${mins} min`;
    return `${Math.floor(mins/60)}h ${mins%60}m`;
  }

  async function renderQueue() {
    const [{ data: cola }, { count: atendidos }] = await Promise.all([
      db.from('turnos').select('*').eq('estado','esperando').order('numero', { ascending: true }),
      db.from('turnos').select('*', { count:'exact', head:true }).eq('estado','atendido')
    ]);

    const queue = cola || [];
    document.getElementById('statEsperando').textContent = queue.length;
    document.getElementById('statAtendidos').textContent = atendidos || 0;
    document.getElementById('lastUpdate').textContent =
      'Actualizado ' + new Date().toLocaleTimeString('es-AR', { hour:'2-digit', minute:'2-digit' });

    const hora = new Date().toLocaleTimeString('es-AR', { hour:'2-digit', minute:'2-digit' });
    document.getElementById('topbarSub').textContent =
      `${queue.length} camión${queue.length !== 1 ? 'es' : ''} esperando · ${hora}`;

    const listEl = document.getElementById('queueList');
    if (!queue.length) {
      listEl.innerHTML = `<div class="queue-empty"><div class="queue-empty-icon">✅</div><div>No hay camiones en espera</div></div>`;
      return;
    }

    listEl.innerHTML = queue.map((t, idx) => `
      <div class="turno-card ${idx === 0 ? 'primero' : ''}">
        <div class="turno-num">${t.numero}</div>
        <div class="turno-info">
          <div class="turno-patente">
            ${t.patente}
            ${idx === 0 ? '<span class="primero-badge">PRÓXIMO</span>' : ''}
          </div>
          <div class="turno-tags">
            <span class="tag tag-producto">${t.producto}</span>
            <span class="tag tag-origen">📍 ${t.origen}</span>
            <span class="tag tag-cpe">CPE: ${t.cpe}</span>
            <span class="tag tag-tiempo">🕐 ${tiempoEspera(t.timestamp)}</span>
          </div>
        </div>
        <div>
          <button class="btn-atender" onclick="atenderTurno('${t.id}')">Dar de baja</button>
        </div>
      </div>`).join('');
  }

  async function atenderTurno(id) {
    await db.from('turnos').update({ estado: 'atendido', atendido_at: Date.now() }).eq('id', id);
  }

  async function siguienteTurno() {
    const { data } = await db.from('turnos').select('id, numero, patente')
      .eq('estado','esperando').order('numero', { ascending: true }).limit(1);
    if (!data?.length) { alert('No hay camiones en espera.'); return; }
    const t = data[0];
    if (confirm(`¿Dar de baja al turno #${t.numero} — ${t.patente}?`)) atenderTurno(t.id);
  }

  // ========== RESET ==========
  function confirmarReset() { document.getElementById('modalReset').classList.add('active'); }
  function cerrarModal()     { document.getElementById('modalReset').classList.remove('active'); }
  async function resetearCola() {
    await db.from('turnos').delete().not('id', 'is', null);
    cerrarModal();
  }

  // ========== REAL-TIME ==========
  function suscribirRealtime() {
    db.channel('cola-balanza')
      .on('postgres_changes', { event: '*', schema: 'public', table: 'turnos' }, () => {
        renderQueue();
      }).subscribe();
  }

  // ========== INICIO ==========
  function iniciarApp() {
    renderQueue();
    suscribirRealtime();
  }

  document.getElementById('modalReset').addEventListener('click', e => {
    if (e.target === e.currentTarget) cerrarModal();
  });
</script>
</body>
</html>
